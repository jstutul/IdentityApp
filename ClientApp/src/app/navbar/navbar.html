<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a routerLink="/" class="nav-brand">
                <img src="./assets/images/logo.png" alt="" class="src">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"    class="nav-link">Home</a>
                    </li>
                        @if ((accountService.user$ | async) === null) {
                        <li class="nav-item">
                            <a routerLink="/play" routerLinkActive="active" class="nav-link">Play</a>
                        </li>
                    }
                </ul>
                @if ((accountService.user$ | async) === null) {
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a routerLink="/accounts/login" class="btn btn-secondary mx-2">
                        Login
                        </a>
                    </li>

                    <li class="nav-item">
                        <a routerLink="/accounts/register" class="btn btn-danger mx-2">
                        Register
                        </a>
                    </li>
                </ul>
                }
                @if(accountService.user$ | async; as user){
                <div class="d-flex align-items-center">
                    <a class="text-center text-white" style="text-decoration: none;cursor: pointer;">
                        Hi <span class="h3 text-warning">{{user.firstName }}</span>
                    </a>
                    <a class="btn btn-secondary ms-2" (click)="logout()">Logout</a>
                </div>
                }
               
            </div>
        </div>
    </nav>
</header>
