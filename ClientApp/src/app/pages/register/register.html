
<div class="d-flex justify-content-center align-items-center"> 
    <div class="col-12 col-lg-5"> 
        <main class="form-signin">
            <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
                <div class="text-center mb-4">
                    <h3 class="mb-3 font-weight-normal">
                        Let's Get statred to Play
                        <span class="text-danger">Game</span>
                    </h3>
                </div>
                <div class="form-floating mb-3">
                    <input type="text" placeholder="First Name" class="form-control"> <label for="firstName">First Name</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="text" placeholder="Last Name" class="form-control"> <label for="lastName">Last Name</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="email" placeholder="Email" class="form-control"> <label for="userName">Email</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="email" placeholder="Email" class="form-control"> <label for="userName">Email</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="password" placeholder="Password" class="form-control"> <label for="password">Password</label>
                </div>  
                <div class="d-grid mt-4 px-1">
                    <button class="btn btn-lg btn-primary" type="submit">Create Account</button>
                </div>
            </form>
        </main>
    </div>  
</div>
